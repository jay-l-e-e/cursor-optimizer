name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: windows-latest
            label: windows-x64
          - os: windows-11-arm
            label: windows-arm64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-latest
            label: macos-arm64
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve the pinned Rust toolchain
        run: rustup show

      - name: Derive the release version from the git tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="0.0.0-dev"
          fi
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          RELEASE_VERSION="${version}" node -e 'const fs=require("fs");const v=process.env.RELEASE_VERSION;const pattern=/(\[workspace\.package\][\s\S]*?\nversion = ")[^"]*(")/;const original=fs.readFileSync("Cargo.toml","utf8");if(!pattern.test(original)){throw new Error("could not locate the workspace version field");}fs.writeFileSync("Cargo.toml",original.replace(pattern,`$1${v}$2`));'

      - name: Lint platform-specific Rust with Clippy
        if: runner.os != 'Linux'
        run: cargo clippy --all-targets --workspace -- --deny warnings

      - name: Install web dependencies
        run: npm ci

      - name: Package the release artifact
        run: cargo bundle

      - name: Upload the build package
        uses: actions/upload-artifact@v7
        with:
          name: cursor-optimizer-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: error

  quality:
    name: quality gate
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install Linux webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve the pinned Rust toolchain
        run: rustup show

      - name: Install web dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust with Clippy
        run: cargo clippy --all-targets --workspace -- --deny warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Lint and format-check the frontend
        run: |
          npm run lint --workspace cursor-optimizer-web
          npm run lint --workspace cursor-optimizer-installer-web

      - name: Type-check the frontend
        run: |
          npm run typecheck --workspace cursor-optimizer-web
          npm run typecheck --workspace cursor-optimizer-installer-web

      - name: Run frontend tests
        run: |
          npm test --workspace cursor-optimizer-web
          npm test --workspace cursor-optimizer-installer-web

  license-check:
    name: license compliance
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Verify dependency licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

  tag:
    name: tag release
    needs: [build, quality, license-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Push a version tag when the commit message is a version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          subject="$(printf '%s' "${COMMIT_MESSAGE}" | head -n 1 | tr -d '\r')"
          pattern='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if [[ ! "${subject}" =~ ${pattern} ]]; then
            echo "Commit subject '${subject}' is not a version; skipping tag."
            exit 0
          fi
          tag="v${subject#v}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists; skipping."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"
          echo "Pushed ${tag}."

  publish:
    name: publish packages
    needs: [build, quality, license-check]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build packages
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: cursor-optimizer-*
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
