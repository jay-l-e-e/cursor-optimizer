[licenses]
version = 2
unused-allowed-license = "allow"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  "BSL-1.0",
  "OFL-1.1",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"

[advisories]
version = 2

[sources]
unknown-registry = "deny"
unknown-git = "deny"
